name: Quality

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    env:
      DEV: true
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Install
        uses: ./.github/actions/install

      - name: Build packages
        run: bun run build

      - name: Run tests
        run: bun test

      - name: Run lint
        run: bun lint
