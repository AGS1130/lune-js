<script type="module">
  import { createApp } from "../../src";

  createApp().mount("#app");
</script>

<div
  id="app"
  lu-scope="{
  text: 'hello',
  checked: true,
  checkToggle: { a: 1 },
  trueValue: { a: 1 },
  falseValue: { a: 2 },
  arr: ['one'],
  radioSelected: 'two',
  selected: 'two'
}"
>
  <pre>{{ $data }}</pre>
  <h2>Text Input</h2>
  {{ text }}
  <input lu-model.trim="text" />

  <h2>TextArea</h2>
  {{ text }}
  <textarea lu-model.trim="text"></textarea>

  <h2>Checkbox</h2>
  <input type="checkbox" id="checkbox" lu-model="checked" />
  <label for="checkbox">{{ checked }}</label>

  <h2>Checkbox w/ Array</h2>
  <label><input type="checkbox" lu-model="arr" value="one" /> one</label>
  <label><input type="checkbox" lu-model="arr" value="two" /> two</label>
  <label><input type="checkbox" lu-model="arr" :value="123" /> actual number</label>
  <div>{{ arr }}</div>

  <h2>Checkbox w/ true-value / false-value</h2>
  <input type="checkbox" lu-model="checkToggle" :true-value="trueValue" :false-value="falseValue" />
  <div>{{ checkToggle }}</div>

  <h2>Radio</h2>
  <label><input type="radio" lu-model="radioSelected" value="one" /> one</label>
  <label><input type="radio" lu-model="radioSelected" value="two" /> two</label>
  <label><input type="radio" lu-model="radioSelected" value="three" /> three</label>
  <div>{{ radioSelected }}</div>

  <h2>Select</h2>
  <select lu-model="selected" @change="console.log(selected, $event.target.value)">
    <option>one</option>
    <option>two</option>
    <option>three</option>
  </select>
  <div>{{ selected }}</div>
</div>
